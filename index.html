<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFFEE FORUM | Темная сторона общения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --header-bg: linear-gradient(135deg, #dc2626, #991b1b);
            --shadow: 0 4px 6px rgba(0,0,0,0.08);
            --table-header: #f9fafb;
            --modal-overlay: rgba(0,0,0,0.6);
            --reply-bg: #fef2f2;
        }

        html.dark {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111114;
            --bg-card: #1a1a1f;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --border-color: #2d2d35;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --header-bg: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --table-header: #1f1f2a;
            --modal-overlay: rgba(0,0,0,0.85);
            --reply-bg: #1f1f2a;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .header {
            background: var(--header-bg);
            padding: 20px 0;
            border-bottom: 3px solid var(--accent);
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 28px;
            letter-spacing: 1px;
        }

        .logo h1 a {
            color: white;
            text-decoration: none;
            font-weight: 800;
        }

        .logo p {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-style: italic;
        }

        .theme-switcher {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.35);
            padding: 6px 16px;
            border-radius: 60px;
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
        }

        .theme-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .theme-btn.active {
            background: var(--accent);
        }

        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 32px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 32px;
            padding: 14px 0;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .forum-header h2 {
            font-size: 26px;
            border-left: 5px solid var(--accent);
            padding-left: 18px;
            font-weight: 700;
        }

        .btn-create, .btn-back {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: var(--shadow);
        }

        .btn-back {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-create:hover, .btn-back:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .forum-table {
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .forum-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .forum-table th {
            background: var(--table-header);
            padding: 18px 16px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid var(--border-color);
        }

        .forum-table td {
            padding: 18px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .forum-table tr:hover {
            background: var(--bg-primary);
            cursor: pointer;
        }

        .topic-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .topic-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .author-name {
            color: var(--accent);
            font-weight: 600;
            background: rgba(220,38,38,0.1);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 13px;
            display: inline-block;
        }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: bold;
        }

        /* Тема и ответы */
        .topic-view {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .topic-title-large {
            font-size: 28px;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .topic-info {
            display: flex;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .topic-content {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .replies-section {
            margin-top: 30px;
        }

        .reply-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent);
        }

        .reply-author {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .reply-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .reply-text {
            line-height: 1.5;
        }

        .reply-form {
            margin-top: 25px;
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 16px;
        }

        .reply-form textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            margin-bottom: 12px;
            min-height: 100px;
        }

        .reply-form input {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .pagination {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 40px;
        }

        .pagination button.active {
            background: var(--accent);
            color: white;
        }

        .footer {
            margin-top: 60px;
            padding: 28px 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 32px;
            max-width: 540px;
            width: 90%;
            border: 1px solid var(--border-color);
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        @media (max-width: 768px) {
            .forum-table th:nth-child(3),
            .forum-table td:nth-child(3),
            .forum-table th:nth-child(4),
            .forum-table td:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1><a href="#" id="homeLink">☕ COFFEE FORUM</a></h1>
                    <p>Темная сторона общения | Свобода слова</p>
                </div>
                <div class="theme-switcher">
                    <button class="theme-btn" id="lightThemeBtn">☀️ Light</button>
                    <button class="theme-btn" id="darkThemeBtn">🌙 Black Rush</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="container">
            <ul class="nav-links">
                <li><a id="homeNav">🏠 Главная</a></li>
                <li><a id="newTopicsNav">💬 Новые темы</a></li>
                <li><a id="popularNav">⭐ Популярное</a></li>
            </ul>
        </div>
    </div>

    <div class="container" id="appContainer">
        <!-- Основной контент будет рендериться здесь -->
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 COFFEE FORUM | Полностью рабочий форум | Данные сохраняются локально</p>
        </div>
    </div>

    <div class="modal" id="topicModal">
        <div class="modal-content">
            <h3>📝 Создать новую тему</h3>
            <input type="text" id="topicTitle" placeholder="Заголовок темы" maxlength="100">
            <textarea id="topicContent" placeholder="Содержание сообщения..."></textarea>
            <input type="text" id="topicAuthor" placeholder="Ваше имя" value="Аноним">
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelTopicBtn" style="background: var(--border-color); padding: 10px 24px; border-radius: 40px;">Отмена</button>
                <button class="btn-submit" id="submitTopicBtn" style="background: var(--accent); color: white; padding: 10px 24px; border-radius: 40px;">Опубликовать</button>
            </div>
        </div>
    </div>

    <script>
        // ========== СТРУКТУРА ДАННЫХ ==========
        let forumData = {
            topics: [],
            nextId: 6
        };

        // Загрузка из localStorage
        function loadData() {
            const saved = localStorage.getItem('coffee_forum_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    forumData = parsed;
                } catch(e) {}
            } else {
                // Стартовые данные
                forumData.topics = [
                    {
                        id: 1,
                        title: "🔥 COFFEE FORUM: Кто здесь главный?",
                        author: "Admin",
                        content: "Добро пожаловать в темный форум! Представьтесь, расскажите о своих кофейных пристрастиях.",
                        replies: [],
                        createdAt: "2026-03-26 14:30",
                        views: 45
                    },
                    {
                        id: 2,
                        title: "⚡ Как заработать первый миллион?",
                        author: "BusinessMan",
                        content: "Делитесь опытом, ребята. Стратегии, риски, реальные кейсы!",
                        replies: [
                            { id: 1, author: "Инвестор", text: "Начни с малого и реинвестируй!", date: "2026-03-26 15:20" }
                        ],
                        createdAt: "2026-03-26 09:00",
                        views: 32
                    },
                    {
                        id: 3,
                        title: "💀 Аниме или сериалы? Что смотреть вечером?",
                        author: "OtakuRush",
                        content: "Нужны рекомендации под мрачное настроение. Cyberpunk? Берсерк?",
                        replies: [
                            { id: 1, author: "WeebKing", text: "Посмотри 'Монстр' — шедевр!", date: "2026-03-25 23:10" }
                        ],
                        createdAt: "2026-03-25 18:00",
                        views: 67
                    }
                ];
                forumData.nextId = 4;
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('coffee_forum_data', JSON.stringify(forumData));
        }

        // Вспомогательные функции
        function getFormattedDate() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Текущее состояние UI
        let currentView = 'list'; // 'list' или 'topic'
        let currentTopicId = null;
        let currentSort = 'date'; // 'date', 'popular'

        // Рендер главного списка
        function renderTopicsList() {
            let topics = [...forumData.topics];
            if (currentSort === 'popular') {
                topics.sort((a, b) => (b.replies.length + b.views) - (a.replies.length + a.views));
            } else {
                topics.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            const container = document.getElementById('appContainer');
            container.innerHTML = `
                <div class="forum-header">
                    <h2>${currentSort === 'popular' ? '⭐ Популярные обсуждения' : '📢 Активные обсуждения'}</h2>
                    <button class="btn-create" id="createTopicBtn">➕ Создать тему</button>
                </div>
                <div class="forum-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Тема</th>
                                <th>Автор</th>
                                <th>Ответы</th>
                                <th>Просмотры</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${topics.map(topic => `
                                <tr onclick="viewTopic(${topic.id})">
                                    <td>
                                        <div class="topic-title">${escapeHtml(topic.title)}</div>
                                        <div class="topic-meta">
                                            <span class="badge">💬 ${topic.replies.length} ответов</span>
                                        </div>
                                    </td>
                                    <td><span class="author-name">${escapeHtml(topic.author)}</span></td>
                                    <td>${topic.replies.length}</td>
                                    <td>${topic.views || 0}</td>
                                    <td>${escapeHtml(topic.createdAt)}</td>
                                </tr>
                            `).join('')}
                            ${topics.length === 0 ? '<tr><td colspan="5" style="text-align:center; padding:40px;">📭 Нет тем. Создайте первую!</td></tr>' : ''}
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('createTopicBtn')?.addEventListener('click', openModal);
        }

        // Просмотр темы с ответами
        window.viewTopic = function(topicId) {
            const topic = forumData.topics.find(t => t.id === topicId);
            if (!topic) return;
            
            // Увеличиваем просмотры
            topic.views = (topic.views || 0) + 1;
            saveData();
            
            currentView = 'topic';
            currentTopicId = topicId;
            
            const container = document.getElementById('appContainer');
            container.innerHTML = `
                <button class="btn-back" id="backToListBtn" style="margin-bottom: 20px;">← Назад к темам</button>
                <div class="topic-view">
                    <h1 class="topic-title-large">${escapeHtml(topic.title)}</h1>
                    <div class="topic-info">
                        <span>👤 ${escapeHtml(topic.author)}</span>
                        <span>📅 ${escapeHtml(topic.createdAt)}</span>
                        <span>👁️ ${topic.views || 0} просмотров</span>
                        <span>💬 ${topic.replies.length} ответов</span>
                    </div>
                    <div class="topic-content">
                        ${escapeHtml(topic.content).replace(/\n/g, '<br>')}
                    </div>
                    
                    <div class="replies-section">
                        <h3>Ответы (${topic.replies.length})</h3>
                        ${topic.replies.map(reply => `
                            <div class="reply-card">
                                <div class="reply-author">${escapeHtml(reply.author)}</div>
